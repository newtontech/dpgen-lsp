name: Release to PyPI

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install release tooling
        run: python -m pip install build twine
      - name: Verify tag matches package version
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$tag_version" != "$package_version" ]; then
            echo "Tag version does not match pyproject.toml: $tag_version != $package_version" >&2
            exit 1
          fi
      - name: Build distributions
        run: python -m build
      - name: Check distribution metadata
        run: python -m twine check dist/*
      - name: Smoke test fresh wheel
        run: bash scripts/smoke_wheel.sh dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    needs: build-and-verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - name: Publish distributions with PyPI Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    name: Create GitHub release
    needs: build-and-verify
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Verify checkout matches the pushed tag
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(git rev-parse "$GITHUB_REF_NAME^{}")" = "$GITHUB_SHA"
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/
      - name: Attach distributions to the tagged release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "::notice::GitHub Release $GITHUB_REF_NAME already exists; not creating a duplicate"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
